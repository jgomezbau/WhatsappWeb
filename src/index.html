<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f0f2f5;
      color: #41525d;
    }
    
    .loader-container {
      text-align: center;
    }
    
    .spinner {
      width: 60px;
      height: 60px;
      margin: 0 auto 20px;
      border: 4px solid rgba(0, 168, 132, 0.2);
      border-top-color: #00a884;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    h1 {
      font-size: 22px;
      font-weight: 500;
      margin: 0 0 10px;
    }
    
    p {
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="loader-container">
    <div class="spinner"></div>
    <h1>Cargando WhatsApp</h1>
    <p>Iniciando conexión segura a WhatsApp Web...</p>
  </div>
</body>
</html>
