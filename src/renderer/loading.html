<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #00a884;
      --green-dark: #008069;
      --bg:         #111b21;
      --bg-surface: #202c33;
      --text:       #e9edef;
      --text-muted: #8696a0;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      user-select: none;
    }

    /* ── Layout ── */
    .screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 32px;
      padding: 40px;
      animation: fadeIn .4s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    /* ── Icon + ring ── */
    .icon-wrap {
      position: relative;
      width: 96px;
      height: 96px;
    }

    .icon-wrap svg.logo {
      width: 96px;
      height: 96px;
      filter: drop-shadow(0 4px 24px rgba(0,168,132,.35));
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 4px 24px rgba(0,168,132,.35)); }
      50%       { filter: drop-shadow(0 4px 36px rgba(0,168,132,.65)); }
    }

    .ring {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--green);
      border-right-color: rgba(0,168,132,.3);
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Text ── */
    .brand {
      text-align: center;
      line-height: 1.4;
    }

    .brand h1 {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -.3px;
      color: var(--text);
    }

    .brand p {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* ── Progress dots ── */
    .dots {
      display: flex;
      gap: 8px;
    }

    .dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      opacity: .25;
      animation: dot 1.4s ease-in-out infinite;
    }

    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }

    @keyframes dot {
      0%, 80%, 100% { opacity: .2;  transform: scale(.9);  }
      40%            { opacity: 1;   transform: scale(1.15); }
    }

    /* ── Bottom note ── */
    .note {
      position: absolute;
      bottom: 28px;
      font-size: 12px;
      color: var(--text-muted);
      opacity: .55;
      letter-spacing: .3px;
    }
  </style>
</head>
<body>
  <div class="screen">

    <div class="icon-wrap">
      <!-- WhatsApp-style phone-in-bubble SVG (no copyrighted asset needed) -->
      <svg class="logo" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="48" cy="48" r="48" fill="#25D366"/>
        <path d="M48 16C30.327 16 16 30.327 16 48c0 5.742 1.56 11.12 4.285 15.746L16 80l16.634-4.227A31.83 31.83 0 0 0 48 80c17.673 0 32-14.327 32-32S65.673 16 48 16Z"
              fill="white" fill-opacity=".15"/>
        <path d="M48 20c-15.464 0-28 12.536-28 28 0 5.18 1.408 10.03 3.87 14.19L20 68l6.02-1.53A27.84 27.84 0 0 0 48 76c15.464 0 28-12.536 28-28S63.464 20 48 20Z"
              fill="white"/>
        <path d="M39.04 33c-.48-1.08-1.01-1.1-1.47-1.12-.38-.02-.82-.02-1.26-.02-.44 0-1.15.17-1.76.84-.6.68-2.3 2.25-2.3 5.48s2.35 6.36 2.68 6.8c.33.44 4.54 7.24 11.18 9.85 5.53 2.18 6.65 1.75 7.85 1.64 1.2-.11 3.87-1.58 4.42-3.1.55-1.53.55-2.84.38-3.11-.16-.27-.6-.44-1.26-.77s-3.87-1.91-4.47-2.12c-.6-.22-1.03-.33-1.47.33-.44.65-1.7 2.12-2.08 2.57-.38.44-.77.49-1.43.16-.66-.33-2.79-1.03-5.31-3.28-1.96-1.75-3.29-3.9-3.67-4.56-.38-.66-.04-1.01.29-1.34.3-.3.66-.77.99-1.16.33-.38.44-.65.66-1.09.22-.44.11-.82-.05-1.15-.17-.33-1.47-3.58-2.08-4.9Z"
              fill="#25D366"/>
      </svg>
      <div class="ring"></div>
    </div>

    <div class="brand">
      <h1>WhatsApp</h1>
      <p>Conectando de forma segura…</p>
    </div>

    <div class="dots">
      <span></span>
      <span></span>
      <span></span>
    </div>

  </div>

  <p class="note">Cliente no oficial para Linux</p>
</body>
</html>
